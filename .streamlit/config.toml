[theme]
# El azul característico de Facebook para botones, enlaces y líneas seleccionadas
primaryColor = "#1877F2"

# El fondo de la barra lateral (un gris azulado muy limpio y profesional)
backgroundColor = "#FFFFFF"

# El fondo principal de la aplicación (Blanco puro)
secondaryBackgroundColor = "#F0F2F5"

# Color del texto principal para que contraste perfectamente (Casi negro)
textColor = "#050505"

# Fuente de letra limpia y moderna
font = "sans serif"
